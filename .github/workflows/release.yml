name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum

      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Embed frontend
        run: |
          rm -rf server/internal/static/dist
          cp -r web/dist server/internal/static/dist

      - name: Build server
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p ../bin
          VERSION=${GITHUB_REF_NAME#v}
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "../bin/mochan-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/mochan

      - name: Package
        run: |
          cd bin
          tar -czf "mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            "mochan-${{ matrix.goos }}-${{ matrix.goarch }}"
          sha256sum "mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" > \
            "mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256"

      - name: Upload binary artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            bin/mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Stage per-arch sha256 for aggregator
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.goarch }}
          path: bin/mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          retention-days: 1

  checksums:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Collect per-arch sha256 files
        uses: actions/download-artifact@v4
        with:
          path: sha
          pattern: sha256-*
          merge-multiple: true

      - name: Build SHA256SUMS
        run: |
          cd sha
          # cat in deterministic order so the file content is stable across reruns
          ls -1 *.tar.gz.sha256 | sort | xargs cat > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Upload SHA256SUMS to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sha/SHA256SUMS
          fail_on_unmatched_files: true
