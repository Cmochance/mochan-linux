name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum

      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Embed frontend
        run: |
          rm -rf server/internal/static/dist
          cp -r web/dist server/internal/static/dist

      - name: Build server
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p ../bin
          VERSION=${GITHUB_REF_NAME#v}
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "../bin/mochan-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/mochan

      - name: Package
        run: |
          cd bin
          tar -czf "mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            "mochan-${{ matrix.goos }}-${{ matrix.goarch }}"
          sha256sum "mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" > \
            "mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256"

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            bin/mochan-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
